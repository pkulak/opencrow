version: "2"
linters:
  default: all
  disable:
    - depguard
    - err113
    - exhaustruct
    - godox
    - mnd
    - varnamelen
    - noinlineerr
    - lll
    - wsl
    - misspell
    - testpackage
  settings:
    gomoddirectives:
      replace-allow-list:
        - fiatjaf.com/nostr
    tagliatelle:
      case:
        rules:
          json: snake
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # revive attributes this package-level finding to one file chosen
      # non-deterministically, so //nolint directives cannot silence it
      # reliably once a package has more than a couple of source files.
      - linters: [revive]
        text: "var-naming: avoid package names that conflict with Go standard library"
        path: ^signal/
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
